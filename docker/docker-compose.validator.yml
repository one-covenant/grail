services:
  validator:
    # Image is overrideable so operators can pin a specific tag (semver or
    # sha256). Defaults to the public ghcr.io tag published by
    # .github/workflows/docker-publish.yml. For local builds set
    # GRAIL_VALIDATOR_IMAGE=grail:base in the environment or .env.
    image: ${GRAIL_VALIDATOR_IMAGE:-ghcr.io/one-covenant/grail:latest}
    container_name: grail-validator
    restart: unless-stopped
    tty: true
    stdin_open: true
    entrypoint: ["/bin/sh", "-c"]
    # GRAIL_VALIDATOR_TEST_MODE=true appends --test-mode (validator only
    # validates its own files; no on-chain weight setting). Required for
    # local test deployments; MUST be unset/false in production.
    command:
      - >-
        mkdir -p /var/log/grail && chmod 755 /var/log/grail &&
        if [ "$$GRAIL_DEBUG" = "true" ]; then VERB="-vv"; else VERB=""; fi;
        if [ "$$GRAIL_VALIDATOR_TEST_MODE" = "true" ]; then ARGS="--test-mode"; else ARGS=""; fi;
        exec uv run --no-sync grail $$VERB validate $$ARGS
    environment:
      # Debug configuration
      - GRAIL_DEBUG=${GRAIL_DEBUG:-false}
      # Set to "true" to start the validator with --test-mode (it only
      # validates its own files and does NOT publish weights on-chain).
      # MUST be unset/false in production.
      - GRAIL_VALIDATOR_TEST_MODE=${GRAIL_VALIDATOR_TEST_MODE:-false}

      # Core Bittensor configuration
      - BT_WALLET_COLD=${BT_WALLET_COLD}
      - BT_WALLET_HOT=${BT_WALLET_HOT:-default}
      - NETUID=${NETUID}
      - BT_NETWORK=${BT_NETWORK}
      - BT_CHAIN_ENDPOINT=${BT_CHAIN_ENDPOINT}

      # R2/S3 Object Storage (REQUIRED for validators)
      - R2_BUCKET_ID=${R2_BUCKET_ID}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_WRITE_ACCESS_KEY_ID=${R2_WRITE_ACCESS_KEY_ID}
      - R2_WRITE_SECRET_ACCESS_KEY=${R2_WRITE_SECRET_ACCESS_KEY}
      - R2_READ_ACCESS_KEY_ID=${R2_READ_ACCESS_KEY_ID}
      - R2_READ_SECRET_ACCESS_KEY=${R2_READ_SECRET_ACCESS_KEY}

      # Monitoring configuration
      - WANDB_API_KEY=${WANDB_API_KEY}
      - WANDB_PROJECT=${WANDB_PROJECT}
      - WANDB_ENTITY=${WANDB_ENTITY}
      - WANDB_MODE=${WANDB_MODE}
      - WANDB_TAGS=${WANDB_TAGS}
      - WANDB_NOTES=${WANDB_NOTES}
      - WANDB_RESUME=${WANDB_RESUME}
      - GRAIL_MONITORING_BACKEND=${GRAIL_MONITORING_BACKEND}
      # WandB storage: redirect all wandb files to mounted volume (not container layer)
      - WANDB_DIR=/root/.cache/wandb
      - WANDB_CACHE_DIR=/root/.cache/wandb
      - WANDB_DATA_DIR=/root/.cache/wandb
      # Disable WandB artifacts and code tracking to prevent disk bloat
      - WANDB_DISABLE_ARTIFACTS=${WANDB_DISABLE_ARTIFACTS:-true}
      - WANDB_DISABLE_CODE=${WANDB_DISABLE_CODE:-true}
      - WANDB_SILENT=${WANDB_SILENT:-true}
      # Disable wandb console output capture (reduces file writes)
      - WANDB_CONSOLE=off
      # Disable git info collection
      - WANDB_DISABLE_GIT=true

      # Hugging Face configuration
      - HF_TOKEN=${HF_TOKEN}
      - HF_USERNAME=${HF_USERNAME}
      - HF_HOME=/root/.cache/huggingface

      # GRAIL checkpoint configuration
      - GRAIL_BASE_CHECKPOINT_RETENTION_LIMIT=${GRAIL_BASE_CHECKPOINT_RETENTION_LIMIT:-3}
      - GRAIL_DELTA_CHECKPOINT_RETENTION_LIMIT=${GRAIL_DELTA_CHECKPOINT_RETENTION_LIMIT:-15}
      - GRAIL_CHECKPOINT_MILESTONE_INTERVAL=${GRAIL_CHECKPOINT_MILESTONE_INTERVAL:-100}
      - GRAIL_CACHE_DIR=${GRAIL_CACHE_DIR}

      # Environment label for observability
      - GRAIL_ENV=${GRAIL_ENV:-prod}

      # Protocol-affecting configuration. The validator overrides
      # GRAIL_THINKING_MODE from the loaded checkpoint metadata at runtime
      # (see grail/validation/miner_validator.py), so prompt rendering stays
      # in sync with the miner regardless of what's set here. This
      # passthrough is belt-and-suspenders for the boot path: any module
      # that calls ``get_thinking_config()`` BEFORE the first checkpoint is
      # loaded (parser regex compile, debug helpers, etc.) needs a sensible
      # value, and ``instructed`` matches the current trainer default.
      #
      # NOTE: GRAIL_ENV_ID / GRAIL_ENV_SPLIT / GRAIL_GEN_* are NOT passed
      # through. They are only consumed on the TRAINER side by
      # ``get_default_env_config`` / ``get_default_generation_params`` when
      # publishing a checkpoint. The validator reads these values from
      # ``checkpoint_metadata.{env_id,env_params,generation_params}`` at
      # runtime; passing them to the validator container would imply the
      # validator reads them, which would be a footgun.
      - GRAIL_THINKING_MODE=${GRAIL_THINKING_MODE:-instructed}

      # Triton kernel evaluation. Only relevant for env_id=triton_kernel
      # (evaluates generated kernels on a spare GPU). For MBPP/coding/math
      # environments this is a no-op. Default is `false` because most
      # validator deployments don't have a spare GPU and `true` would
      # silently increase the GPU footprint of the validator container.
      # When using triton_kernel, set GRAIL_GPU_EVAL=true on the host .env
      # AND bump GRAIL_VALIDATOR_GPU_IDS to include the eval GPU.
      - GRAIL_GPU_EVAL=${GRAIL_GPU_EVAL:-false}
      - KERNEL_EVAL_GPU_IDS=${KERNEL_EVAL_GPU_IDS:-1}
      - KERNEL_EVAL_BACKEND=${KERNEL_EVAL_BACKEND:-persistent}
      - KERNEL_EVAL_TIMEOUT=${KERNEL_EVAL_TIMEOUT:-60}

      # Performance tuning
      - PYTORCH_ALLOC_CONF=expandable_segments:True
      - TRANSFORMERS_NO_ADVISORY_WARNINGS=1
      - GRAIL_METRIC_BUFFER_SIZE=${GRAIL_METRIC_BUFFER_SIZE}
      - GRAIL_METRIC_FLUSH_INTERVAL=${GRAIL_METRIC_FLUSH_INTERVAL}

      # NVIDIA visibility is controlled by the deploy.resources block below
      # via ``device_ids``. We deliberately do NOT set NVIDIA_VISIBLE_DEVICES
      # here: when both are present, Docker Compose's ``device_ids`` is the
      # contract that actually pins the container to specific physical GPUs,
      # while ``NVIDIA_VISIBLE_DEVICES=all`` would override it and expose
      # every GPU. Setting capabilities here is still required.
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility

      # Network timeout and retry configuration
      - BT_CALL_TIMEOUT=${BT_CALL_TIMEOUT:-15.0}
      - BT_CALL_RETRIES=${BT_CALL_RETRIES:-3}
      - BT_CALL_BACKOFF=${BT_CALL_BACKOFF:-5.0}

      # Logging configuration
      - PROMTAIL_ENABLE=${PROMTAIL_ENABLE:-true}
      - GRAIL_LOG_FILE=${GRAIL_LOG_FILE:-/var/log/grail/grail.log}
      - GRAIL_LOG_MAX_SIZE=${GRAIL_LOG_MAX_SIZE:-100MB}
      - GRAIL_LOG_BACKUP_COUNT=${GRAIL_LOG_BACKUP_COUNT:-5}

    volumes:
      # Persistent storage for wallet and cache
      - ${HOME}/.bittensor:/root/.bittensor
      - validator-cache:/root/.cache
      - validator-data:/app/data
      - validator-logs:/var/log/grail
      # Optional: mount a large host directory for checkpoint storage.
      # Set GRAIL_HOST_STORAGE_PATH in .env to your high-capacity mount (e.g., /ephemeral, /mnt/data).
      # Defaults to ~/grail-storage if unset.
      - ${GRAIL_HOST_STORAGE_PATH:-${HOME}/grail-storage}:${GRAIL_HOST_STORAGE_PATH:-${HOME}/grail-storage}

    # HF dataloaders and multiprocessing IPC need more than the 64 MB default.
    shm_size: ${GRAIL_VALIDATOR_SHM_SIZE:-2g}

    # Share the host PID namespace. The validator's checkpoint cache
    # cleanup uses ``os.kill(pid, 0)`` to detect orphaned ``*.partial``
    # download dirs left behind by crashed downloaders. Inside the
    # container's default PID namespace that probe ALWAYS fails for host
    # PIDs (ESRCH), so a co-located bare-metal miner sharing the same
    # ``GRAIL_HOST_STORAGE_PATH`` cache will see its in-flight partials
    # deleted from under it. Sharing the host PID namespace lets the
    # validator see the real owners and skip live partials. Production
    # validators with their own dedicated cache directory can drop this.
    pid: host

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              # Pin the validator to a single physical GPU via
              # GRAIL_VALIDATOR_GPU_IDS (e.g. "0", "2", or "7"). This is the
              # right contract on multi-GPU hosts: ``count: N`` lets docker
              # pick any N GPUs, which collides with co-located miners and
              # trainers. Default to GPU 0 alone (validators only need one
              # GPU for model + proof verification when GRAIL_GPU_EVAL=false).
              #
              # NOTE: Compose interpolates ``["${VAR}"]`` as ONE list element,
              # so a comma-separated value like "0,1" would be parsed as the
              # literal device id "0,1" (broken). Multi-GPU validators (e.g.
              # GPU 0 for model + GPU 1 for kernel eval when
              # GRAIL_GPU_EVAL=true) MUST hand-edit this block to a YAML list
              # of strings: ``device_ids: ["0", "1"]``. There is no clean way
              # to source a YAML list from a single env var.
              device_ids: ["${GRAIL_VALIDATOR_GPU_IDS:-0}"]
              capabilities: [gpu]

    networks:
      - grail-network

    # Health check to ensure validator is running
    healthcheck:
      test: ["CMD", "pgrep", "-f", "grail validate"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

    # Labels for Watchtower
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "com.centurylinklabs.watchtower.stop-signal=SIGTERM"
      - "com.centurylinklabs.watchtower.timeout=120s"

  janitor:
    image: alpine:3.20
    container_name: grail-janitor
    restart: unless-stopped
    command:
      - /bin/sh
      - -lc
      - >-
        set -eu;
        echo "[janitor] started";
        while true; do
          TS=$$(date '+%Y-%m-%d %H:%M:%S');
          echo "[$${TS}] janitor: running cleanup";
          W=/root/.cache/wandb;
          H=/root/.cache/huggingface;
          L=/var/log/grail;
          # WandB: aggressively clean all wandb data older than WANDB_MAX_AGE_DAYS
          if [ -d "$$W" ]; then
            # Clean run directories (wandb/run-*)
            find "$$W" -maxdepth 1 -type d -name "run-*" -mtime +$${WANDB_MAX_AGE_DAYS:-7} -exec rm -rf {} + 2>/dev/null || true;
            # Clean logs directory
            find "$$W/logs" -mindepth 1 -type d -mtime +$${WANDB_MAX_AGE_DAYS:-7} -exec rm -rf {} + 2>/dev/null || true;
            # Clean artifacts recursively (obj/md5/* structure)
            find "$$W/artifacts" -type f -mtime +$${WANDB_MAX_AGE_DAYS:-7} -delete 2>/dev/null || true;
            find "$$W/artifacts" -type d -empty -delete 2>/dev/null || true;
            # Clean tmp directory in artifacts
            rm -rf "$$W/artifacts/tmp"/* 2>/dev/null || true;
            # Report wandb cache size
            echo "[$${TS}] wandb cache size: $$(du -sh $$W 2>/dev/null | cut -f1 || echo 'N/A')";
          fi;
          # HuggingFace: prune files older than HF_MAX_AGE_DAYS, then empty dirs
          if [ -d "$$H" ]; then
            find "$$H" -type f -mtime +$${HF_MAX_AGE_DAYS:-14} -delete 2>/dev/null || true;
            find "$$H" -type d -empty -delete 2>/dev/null || true;
          fi;
          # Logs: remove rotated logs older than LOG_MAX_AGE_DAYS (do not truncate active file)
          if [ -d "$$L" ]; then
            find "$$L" -type f -name "*.log.*" -mtime +$${LOG_MAX_AGE_DAYS:-14} -delete 2>/dev/null || true;
          fi;
          # Checkpoints: remove orphaned .partial directories older than 1 hour
          C=$${GRAIL_CACHE_DIR:-/root/.cache/grail}/checkpoints;
          if [ -d "$$C" ]; then
            PARTIAL_COUNT=$$(find "$$C" -maxdepth 1 -type d -name "*.partial" -mmin +60 2>/dev/null | wc -l);
            if [ "$$PARTIAL_COUNT" -gt 0 ]; then
              echo "[$${TS}] cleaning $$PARTIAL_COUNT orphaned .partial checkpoint dirs";
              find "$$C" -maxdepth 1 -type d -name "*.partial" -mmin +60 -exec rm -rf {} + 2>/dev/null || true;
            fi;
            echo "[$${TS}] checkpoint cache: $$(du -sh $$C 2>/dev/null | cut -f1 || echo 'N/A'), $$(ls -1d $$C/checkpoint-* 2>/dev/null | wc -l) dirs";
          fi;
          # Disk usage warning
          DISK_USE=$$(df $${GRAIL_CACHE_DIR:-/root/.cache/grail} 2>/dev/null | awk 'NR==2{print $$5}' | tr -d '%');
          if [ -n "$$DISK_USE" ] && [ "$$DISK_USE" -gt 90 ]; then
            echo "[$${TS}] WARNING: disk usage at $${DISK_USE}%!";
          fi;
          sleep $${JANITOR_INTERVAL_SECONDS:-3600};
        done
    environment:
      - JANITOR_INTERVAL_SECONDS=${JANITOR_INTERVAL_SECONDS:-3600}
      - WANDB_MAX_AGE_DAYS=${WANDB_MAX_AGE_DAYS:-7}
      - HF_MAX_AGE_DAYS=${HF_MAX_AGE_DAYS:-14}
      - LOG_MAX_AGE_DAYS=${LOG_MAX_AGE_DAYS:-14}
      - GRAIL_CACHE_DIR=${GRAIL_CACHE_DIR}
    volumes:
      - validator-cache:/root/.cache
      - validator-logs:/var/log/grail
      # Mount host storage so janitor can clean orphaned checkpoint partials
      - ${GRAIL_HOST_STORAGE_PATH:-${HOME}/grail-storage}:${GRAIL_HOST_STORAGE_PATH:-${HOME}/grail-storage}
    depends_on:
      - validator
    networks:
      - grail-network
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 30 --cleanup --label-enable
    restart: unless-stopped
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_INCLUDE_RESTARTING=true
      # Required for Docker Engine 25+, which dropped support for API versions below 1.44
      - DOCKER_API_VERSION=1.47

  promtail:
    image: grafana/promtail:latest
    container_name: grail-promtail
    restart: unless-stopped
    command: ["-config.file=/etc/promtail/promtail.yml", "-config.expand-env=true"]
    profiles:
      - promtail
    environment:
      - PROMTAIL_LOKI_URL=${PROMTAIL_LOKI_URL:-http://loki:3100/loki/api/v1/push}
      - PROMTAIL_JOB=${PROMTAIL_JOB:-grail}
      - GRAIL_ENV=${GRAIL_ENV:-prod}
      - BT_NETWORK=${BT_NETWORK}
      - NETUID=${NETUID}
      - BT_WALLET_COLD=${BT_WALLET_COLD}
      - BT_WALLET_HOT=${BT_WALLET_HOT:-default}
    volumes:
      - promtail-positions:/var/lib/promtail
      - validator-logs:/var/log/grail:ro
      - ./promtail.yml:/etc/promtail/promtail.yml:ro
    depends_on:
      - validator
    networks:
      - grail-network
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

networks:
  grail-network:
    driver: bridge

volumes:
  validator-cache:
    driver: local
  validator-data:
    driver: local
  validator-logs:
    driver: local
  promtail-positions:
    driver: local
